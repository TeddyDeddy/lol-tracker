# Ručně kurátorované buffy/nerfy championů per patch (pro /pro/meta stránku).
# Import: automaticky při `python -m lol.leaguepedia ingest|update`.
#
# Formát:
# [[change]]
# patch = "25.05"        # přesně jak ho hlásí Leaguepedia (sloupec patch v pro_games)
