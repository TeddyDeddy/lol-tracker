<script>
(function () {
  document.querySelectorAll(".bracket.playoffs").forEach(function (root) {
    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "bracket-svg");
    root.appendChild(svg);
    function draw() {
      svg.innerHTML = "";
      var rr = root.getBoundingClientRect();
      svg.setAttribute("width", root.scrollWidth);
      svg.setAttribute("height", root.scrollHeight);
      var cells = {};
      root.querySelectorAll(".bracket-cell[data-mid]").forEach(function (c) {
        cells[c.dataset.mid] = c;
      });
      Object.values(cells).forEach(function (c) {
        if (!c.dataset.feeds) return;
        var to = c.querySelector(".bracket-match").getBoundingClientRect();
        c.dataset.feeds.split("|").forEach(function (fid) {
          var f = cells[fid];
          if (!f) return;
          var from = f.querySelector(".bracket-match").getBoundingClientRect();
          var x1 = from.right - rr.left, y1 = from.top + from.height / 2 - rr.top;
          var x2 = to.left - rr.left, y2 = to.top + to.height / 2 - rr.top;
          var mx = x1 + (x2 - x1) / 2;
          var p = document.createElementNS("http://www.w3.org/2000/svg", "path");
          p.setAttribute("d", "M" + x1 + " " + y1 + " H" + mx + " V" + y2 + " H" + x2);
          p.setAttribute("fill", "none");
          p.setAttribute("stroke", "rgba(255,255,255,0.35)");
          p.setAttribute("stroke-width", "1.5");
          svg.appendChild(p);
        });
      });
    }
    draw();
    addEventListener("resize", draw);
    root._redraw = draw;
  });
})();
</script>
